<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 13</title>
</head>
<body>
    <h1>Exercício 13</h1>
    <script>
      let count = 0;
        for (let i = 0; i < 10; i++) {
            let n = parseInt(prompt("Digite um número:"));
            if (n >= 10 && n <= 50) count++;
        }
        alert("Números no intervalo [10, 50]: " + count);
    </script>
</body>
</html>
