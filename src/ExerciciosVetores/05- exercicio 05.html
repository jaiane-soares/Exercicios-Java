<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 05</title>
</head>
<body>
    <h1>Exercício 05</h1>
    <script>
        let nums = [];
        for (let i = 0; i < 5; i++) nums.push(parseInt(prompt("Digite um número:")));
        alert("Maior: " + Math.max(...nums) + " | Menor: " + Math.min(...nums));
    </script>
</body>
</html>
