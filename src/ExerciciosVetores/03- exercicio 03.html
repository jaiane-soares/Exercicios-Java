<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 03</title>
</head>
<body>
    <h1>Exercício 03</h1>
    <script>
       let soma = 0;
        for (let i = 0; i < 7; i++) {
            soma += parseInt(prompt("Digite um número:"));
        }
        alert("A média é: " + (soma / 7));
    </script>
</body>
</html>
