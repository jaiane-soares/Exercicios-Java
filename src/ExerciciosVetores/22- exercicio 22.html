    <script>
                let a = [[1,2],[3,4]], b = [[5,6],[7,8]];

            for(let j=0; j<2; j++)
                for(let k=0; k<2; k++) res[i][j] += a[i][k] * b[k][j];
        alert(JSON.stringify(res));
    </script>
