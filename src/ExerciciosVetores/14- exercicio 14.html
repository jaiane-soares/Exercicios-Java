<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 14</title>
</head>
<body>
    <h1>Exercício 14</h1>
    <script>
       let pares = [];
        for (let i = 0; i < 7; i++) {
            let n = parseInt(prompt("Digite um número:"));
            if (n % 2 === 0) pares.push(n);
        }
        alert("Pares digitados: " + pares.join(", "));
    </script>
</body>
</html>
