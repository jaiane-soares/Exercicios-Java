<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 11</title>
</head>
<body>
    <h1>Exercício 11</h1>
    <script>
      let somaPos = 0, somaNeg = 0;
        for (let i = 0; i < 10; i++) {
            let n = parseInt(prompt("Digite um número:"));
            n > 0 ? somaPos += n : somaNeg += n;
        }
        alert("Soma Positivos: " + somaPos + " | Soma Negativos: " + somaNeg);
    </script>
</body>
</html>
