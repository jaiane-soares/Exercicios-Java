<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 04</title>
</head>
<body>
    <h1>Exercício 04</h1>
    <script>
        let pares = 0;
        for (let i = 0; i < 5; i++) {
            if (parseInt(prompt("Digite um número:")) % 2 === 0) pares++;
        }
        alert("Quantidade de pares: " + pares);
    </script>
</body>
</html>
