<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 09</title>
</head>
<body>
    <h1>Exercício 09</h1>
    <script>
        let pos = 0, neg = 0;
        for (let i = 0; i < 10; i++) {
            let n = parseInt(prompt("Digite um número:"));
            n > 0 ? pos++ : (n < 0 ? neg++ : null);
        }
        alert("Positivos: " + pos + " | Negativos: " + neg);
    </script>
</body>
</html>
