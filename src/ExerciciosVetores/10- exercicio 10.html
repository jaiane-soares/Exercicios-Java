<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Exercício 10</title>
</head>
<body>
    <h1>Exercício 10</h1>
    <script>
        let temZero = false;
        for (let i = 0; i < 5; i++) {
            if (parseInt(prompt("Digite um número:")) === 0) temZero = true;
        }
        alert(temZero ? "Existe zero!" : "Não existe zero.");
    </script>
</body>
</html>
